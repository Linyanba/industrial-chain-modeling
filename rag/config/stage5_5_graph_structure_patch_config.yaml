# 阶段 5.5 建图前结构修正补丁配置
# 禁止：调用外部API、联网搜索、调用LLM、新增无证据事实关系、生成图谱、写Neo4j

project_root: "D:\\产业链建模"

stage5:
  latest_pointer: "D:\\产业链建模\\rag\\latest_stage5_run.txt"
  required_files:
    - "graph_ready_nodes.csv"
    - "graph_ready_edges.csv"
    - "graph_ready_aliases.csv"
    - "graph_ready_evidence_map.csv"
    - "node_quality_report.csv"
    - "edge_quality_report.csv"
    - "graph_integrity_issues.csv"
    - "graph_statistics.json"
    - "graph_readiness_report.md"
    - "validation_summary.json"

# 节点合并规则
node_merge_rules:
  # 晶圆制造重复节点：保留 L3_industry_link，移除 L0_industry
  - match_label: "晶圆制造"
    keep_level: "L3_industry_link"
    remove_level: "L0_industry"
    merge_strategy: "absorb_sources_and_aliases"

# Schema/Layout 边补充规则
schema_edges:
  # 集成电路 PART_OF 半导体产业
  - source_label: "集成电路"
    relation_type: "PART_OF"
    target_label: "半导体产业"
    edge_source: "system_schema"
    reason: "L1_sector 归属 L0 schema root"

layout_edges:
  # 主链环节归入集成电路
  - source_label: "设计"
    relation_type: "PART_OF"
    target_label: "集成电路"
    edge_source: "layout_helper"
    reason: "芯片设计为集成电路产业主链环节"
  - source_label: "晶圆制造"
    relation_type: "PART_OF"
    target_label: "集成电路"
    edge_source: "layout_helper"
    reason: "晶圆制造为集成电路产业主链环节"
  - source_label: "封装测试"
    relation_type: "PART_OF"
    target_label: "集成电路"
    edge_source: "layout_helper"
    reason: "封装测试为集成电路产业主链环节"
  # 封装/测试归入封装测试
  - source_label: "封装"
    relation_type: "PART_OF"
    target_label: "封装测试"
    edge_source: "layout_helper"
    reason: "封装为封装测试子环节"
  - source_label: "测试"
    relation_type: "PART_OF"
    target_label: "封装测试"
    edge_source: "layout_helper"
    reason: "测试为封装测试子环节"

# 主链完整性检查
main_chain:
  core_nodes:
    - "半导体产业"
    - "集成电路"
    - "设计"
    - "晶圆制造"
    - "封装测试"
    - "封装"
    - "测试"

# 输出配置
output:
  base_dir: "D:\\产业链建模\\rag\\outputs"
  run_prefix: "stage5_5_graph_structure_patch_"
  latest_pointer: "D:\\产业链建模\\rag\\latest_stage5_5_run.txt"
  csv_encoding: "utf-8-sig"

boundary:
  stage: "5.5"
  scope: "结构补丁、节点合并、布局辅助边补充、schema边补充、别名更新"
  forbidden:
    - "调用外部云端 API"
    - "联网搜索"
    - "调用本地 LLM"
    - "重新抽取实体或关系"
    - "从 rejected/archived/deferred 恢复关系"
    - "伪造白皮书证据"
    - "把 schema/layout 边伪装成 evidence fact"
    - "写入 Neo4j"
    - "生成正式图谱"
    - "修改原始 PDF"
    - "覆盖阶段 1/2/3A/3B/3C/4/4.5/4.6/5 输出"
