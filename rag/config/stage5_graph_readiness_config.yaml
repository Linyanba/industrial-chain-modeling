# 阶段 5 approved 结果质量检查与建图准备配置
# 禁止：调用外部API、联网搜索、调用LLM、新增无证据关系、生成图谱、写Neo4j

project_root: "D:\\产业链建模"

stage4_6:
  latest_pointer: "D:\\产业链建模\\rag\\latest_stage4_6_run.txt"
  required_files:
    - "approved_entities.csv"
    - "approved_relations.csv"
    - "approved_entity_aliases.csv"
    - "approved_relation_evidence_map.csv"
    - "auto_applied_review_decisions.csv"
    - "patch_application_log.jsonl"
    - "stage4_6_auto_apply_report.md"
    - "validation_summary.json"

# 允许的枚举值
allowed_values:
  entity_level: ["L0_industry", "L1_sector", "L2_sub_chain", "L3_industry_link", "L4_object", "auxiliary", "unknown"]
  value_chain_stage: ["upstream", "midstream", "downstream", "supporting", "recycling", "cross_stage", "unknown"]
  entity_type: ["industry", "sector", "sub_chain", "industry_link", "process", "material", "component", "product", "equipment", "technology", "application", "company", "organization", "region", "policy", "standard", "unknown"]
  relation_type: ["PART_OF", "INPUT_TO", "OUTPUT_OF", "SUPPLIES_TO", "PROCESSES", "MANUFACTURES", "OPERATES_IN", "SERVES", "USES_TECHNOLOGY", "LOCATED_IN", "REGULATES", "GOVERNS", "RECYCLES", "SUBSTITUTES"]
  issue_severity: ["critical", "high", "medium", "low"]

# 主链核心节点（用于完整性检查）
main_chain:
  core_nodes:
    - "半导体产业"
    - "集成电路"
    - "设计"
    - "晶圆制造"
    - "封装测试"
    - "封装"
    - "测试"
  core_relations:
    - ["设计", "SUPPLIES_TO", "晶圆制造"]
    - ["晶圆制造", "SUPPLIES_TO", "封装"]
    - ["封装", "SUPPLIES_TO", "测试"]

# 质量检查规则
quality_checks:
  check_empty_names: true
  check_invalid_types: true
  check_invalid_levels: true
  check_invalid_vcs: true
  check_duplicates: true
  check_isolated_nodes: true
  check_edge_endpoints: true
  check_edge_evidence: true
  check_relation_direction: true
  check_main_chain: true

# 孤立节点处理
isolated_node_policy:
  allow_auxiliary_isolated: true
  allow_schema_root_isolated: true
  flag_core_isolated_as_high: true

# 输出配置
output:
  base_dir: "D:\\产业链建模\\rag\\outputs"
  run_prefix: "stage5_graph_readiness_"
  latest_pointer: "D:\\产业链建模\\rag\\latest_stage5_run.txt"
  csv_encoding: "utf-8-sig"

boundary:
  stage: "5"
  scope: "approved结果质量检查、字段规范化、图谱建图前节点边准备、证据完整性检查"
  forbidden:
    - "调用外部云端 API"
    - "联网搜索"
    - "调用本地 LLM 重新判断"
    - "重新抽取新实体或新关系"
    - "新增无证据关系"
    - "从 rejected/archived/deferred 恢复候选"
    - "写入 Neo4j"
    - "生成正式图谱"
    - "修改原始 PDF"
    - "覆盖阶段 1/2/3A/3B/3C/4/4.5/4.6 输出"
