# 阶段 3C 候选实体/关系抽取任务
# 每个任务用 query 做 Qdrant 检索，再交给 qwen3:8b 抽取候选实体与候选关系。
# 本文件必须保持行业无关；不要写入任何固定行业、固定产品或历史 PDF 的默认术语。
tasks:
  - id: t01
    task: "抽取当前白皮书明确描述的产业链核心模块、环节及层级关系"
    query: "当前白皮书中的产业链包括哪些核心模块、主要环节和层级关系？"
    keywords: ["产业链", "包括", "包含", "构成", "分为", "环节"]
  - id: t02
    task: "抽取章节标题、图注和正文中出现的产业链结构性分类"
    query: "当前白皮书的章节标题、图注和正文如何划分产业链结构、分类、模块或子链？"
  - id: t03
    task: "抽取材料、部件、设备、工具、服务或资源等具体输入实体及其服务或供给对象"
    query: "当前产业链有哪些具体材料、部件、设备、工具、服务或资源？原文明确说明它们输入到哪些环节或产品？"
    keywords: ["材料", "设备", "部件", "供应", "供给", "用于", "投入"]
  - id: t04
    task: "抽取制造、加工、集成、运营、交付或服务等具体环节及其关系"
    query: "当前产业链有哪些具体制造、加工、集成、运营、交付或服务环节？原文明确说明这些环节之间是什么关系？"
    keywords: ["制造", "生产", "加工", "集成", "封装", "测试", "工艺"]
  - id: t05
    task: "抽取产品、组件、系统、解决方案等产出类实体"
    query: "当前白皮书中提到哪些产品、组件、系统、解决方案或成果？它们由哪些环节产出或服务哪些应用？"
  - id: t06
    task: "抽取关键技术、工艺、平台、标准和能力及其使用关系"
    query: "当前白皮书中有哪些关键技术、工艺、平台、标准或能力？它们被哪些环节、产品或应用使用？"
  - id: t07
    task: "抽取具体应用、终端场景、客户行业和服务对象"
    query: "当前产业链有哪些具体应用、终端场景、客户行业或服务对象？原文明确说明哪些产品或环节服务这些对象？"
    keywords: ["应用", "终端", "场景", "服务", "面向", "应用于"]
  - id: t08
    task: "抽取由“包括、包含、分为、由……构成、主要有”等表述支持的父子关系；每个子项单独输出一条 子项PART_OF父项，禁止反向，禁止把子项列表合成一个实体"
    query: "当前白皮书中哪些句子使用包括、包含、分为、由……构成、主要有等表达来说明实体之间的父子或组成关系？"
    keywords: ["包括", "包含", "分为", "构成", "组成", "涵盖", "属于"]
  - id: t09
    task: "抽取供给、输入、输出、服务、使用等方向明确的产业链关系"
    query: "当前白皮书中有哪些供给、输入、输出、服务、使用、制造、加工、治理或替代关系？如果证据不足，不要强行抽取。"
    keywords: ["供应", "供给", "输入", "产出", "服务", "用于", "使用", "采用", "制造", "加工", "替代"]
  - id: t10
    task: "抽取政策、趋势、规划类内容并区分其是否为现实产业事实"
    query: "当前白皮书中哪些政策、趋势、规划、目标或建议影响产业链？如果只是预测或规划，不要当作现实产业关系。"
