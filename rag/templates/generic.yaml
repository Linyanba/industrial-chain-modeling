template_id: generic
template_name: "通用产业链模板"
root_label_default: "产业链"
description: "兜底通用产业链模板，按上游/中游/下游/支撑体系分层。仅在document_driven不可用或用户明确指定generic时使用。"
fallback_only: true
fallback_warning: "generic 是兜底模板，输出可能较粗，不作为默认最佳方案。"

excluded_tree_entity_types: ["company"]

first_level_nodes:
  - label: "上游"
    category: "upstream"
    accept_entity_types: ["material", "component", "equipment"]
    keywords: ["上游", "原材料", "零部件", "供应"]
    children:
      - label: "原材料"
        category: "material"
        children: []
      - label: "核心零部件"
        category: "component"
        children: []
      - label: "设备与工具"
        category: "equipment"
        children: []
  - label: "中游"
    category: "midstream"
    accept_entity_types: ["industry_link", "process"]
    keywords: ["中游", "制造", "生产", "加工"]
    children:
      - label: "研发设计"
        category: "design"
        children: []
      - label: "生产制造"
        category: "manufacturing"
        children: []
      - label: "加工组装"
        category: "assembly"
        children: []
  - label: "下游"
    category: "downstream"
    accept_entity_types: ["product", "application"]
    keywords: ["下游", "终端", "应用", "市场"]
    children:
      - label: "终端产品"
        category: "product"
        children: []
      - label: "应用场景"
        category: "application"
        children: []
      - label: "服务市场"
        category: "service"
        children: []
  - label: "支撑体系"
    category: "supporting"
    accept_entity_types: ["technology", "standard", "policy"]
    keywords: ["支撑", "技术", "标准", "政策", "平台"]
    children:
      - label: "技术"
        category: "technology"
        children: []
      - label: "平台"
        category: "platform"
        children: []
      - label: "标准"
        category: "standard"
        children: []
      - label: "政策"
        category: "policy"
        children: []
node_alias_rules: {}

entity_classification_rules:
  - entity_type: "material"
    target_path: ["上游", "原材料"]
  - entity_type: "component"
    target_path: ["上游", "核心零部件"]
  - entity_type: "equipment"
    target_path: ["上游", "设备与工具"]
  - entity_type: "technology"
    target_path: ["支撑体系", "技术"]
  - entity_type: "standard"
    target_path: ["支撑体系", "标准"]
  - entity_type: "policy"
    target_path: ["支撑体系", "政策"]
  - entity_type: "product"
    target_path: ["下游", "终端产品"]
  - entity_type: "application"
    target_path: ["下游", "应用场景"]
  - entity_type: "process"
    condition: "value_chain_stage == 'upstream'"
    target_path: ["上游"]
  - entity_type: "process"
    condition: "value_chain_stage == 'midstream'"
    target_path: ["中游", "生产制造"]
  - entity_type: "process"
    condition: "value_chain_stage == 'downstream'"
    target_path: ["下游"]
  - entity_type: "process"
    condition: "value_chain_stage == 'supporting'"
    target_path: ["支撑体系"]
  - entity_type: "industry_link"
    condition: "value_chain_stage == 'upstream'"
    target_path: ["上游"]
  - entity_type: "industry_link"
    condition: "value_chain_stage == 'midstream'"
    target_path: ["中游"]
  - entity_type: "industry_link"
    condition: "value_chain_stage == 'downstream'"
    target_path: ["下游"]
  - entity_type: "industry_link"
    condition: "value_chain_stage == 'supporting'"
    target_path: ["支撑体系"]

tree_build_rules:
  allow_display_schema_nodes: true
  mark_schema_nodes_in_report: true
  keep_empty_template_nodes: true
  unclassified_strategy: "export_to_csv"

display_style:
  direction: "left_to_right"
  node_fill: "#4A90D9"
  node_stroke: "#2E6DAB"
  node_text_color: "#FFFFFF"
  root_fill: "#1B5E8C"
  level1_fill: "#3B82C4"
  line_color: "#7CB8E4"
  line_width: 2
  background: "#FFFFFF"
  font_family: "Microsoft YaHei"
  node_rx: 8

required_outputs:
  png_prefix: "industry_chain_tree"
  svg_prefix: "industry_chain_tree"
  html_prefix: "industry_chain_tree"
  title: "产业链多级结构图"
